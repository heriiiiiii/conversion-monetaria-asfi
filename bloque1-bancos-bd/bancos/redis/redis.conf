# =============================================================
# REDIS: Banco Nación Argentina — Cifrado ChaCha20
# =============================================================
# Configuración del servidor Redis para el banco.
# =============================================================

# ── Seguridad ──────────────────────────────
requirepass admin123

# ── Persistencia (AOF + RDB) ───────────────
appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000

# ── Base de datos ──────────────────────────
# DB 0 = cuentas del Banco Nación Argentina
databases 1

# ── Red ───────────────────────────────────
bind 0.0.0.0
protected-mode no
port 6379

# ── Logging ───────────────────────────────
loglevel notice

# ── Memoria ───────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru
